<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Subtle geometric pattern for luxury background -->
  <defs>
    <pattern id="pattern1" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Light decorative elements -->
      <circle cx="50" cy="50" r="1" fill="#B49F79" opacity="0.15"/>
      <circle cx="100" cy="100" r="1" fill="#C893A0" opacity="0.15"/>
      <circle cx="150" cy="150" r="1" fill="#B49F79" opacity="0.15"/>
      <circle cx="50" cy="150" r="1" fill="#C893A0" opacity="0.15"/>
      <circle cx="150" cy="50" r="1" fill="#B49F79" opacity="0.15"/>
      <circle cx="100" cy="50" r="1" fill="#C893A0" opacity="0.1"/>
      <circle cx="50" cy="100" r="1" fill="#B49F79" opacity="0.1"/>
      <circle cx="100" cy="150" r="1" fill="#C893A0" opacity="0.1"/>
      <circle cx="150" cy="100" r="1" fill="#B49F79" opacity="0.1"/>
      <!-- Decorative lines -->
      <line x1="0" y1="20" x2="30" y2="20" stroke="#B49F79" stroke-width="0.5" opacity="0.1"/>
      <line x1="70" y1="80" x2="100" y2="80" stroke="#C893A0" stroke-width="0.5" opacity="0.1"/>
      <line x1="120" y1="140" x2="150" y2="140" stroke="#B49F79" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#pattern1)"/>
</svg>